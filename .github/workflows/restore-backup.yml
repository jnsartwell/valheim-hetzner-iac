name: "Backup: Restore"

on:
  workflow_dispatch:
    inputs:
      artifact_name:
        description: 'Artifact name to restore (e.g. valheim-world-MyWorld-20260316-1253)'
        required: true

env:
  SERVER_HOST: ${{ vars.SERVER_HOST }}

jobs:
  restore:
    name: Restore World from Backup
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download backup artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p restore
          ARTIFACT_ID=$(gh api "repos/${{ github.repository }}/actions/artifacts?name=${{ inputs.artifact_name }}&per_page=1" --jq '.artifacts[0].id')
          if [ -z "$ARTIFACT_ID" ] || [ "$ARTIFACT_ID" = "null" ]; then
            echo "::error::Artifact '${{ inputs.artifact_name }}' not found."
            echo ""
            echo "Available artifacts:"
            gh api "repos/${{ github.repository }}/actions/artifacts?per_page=10" --jq '.artifacts[] | select(.expired == false) | .name'
            echo ""
            echo "Browse all artifacts: ${{ github.server_url }}/${{ github.repository }}/actions/workflows/backup.yml"
            exit 1
          fi
          gh api "repos/${{ github.repository }}/actions/artifacts/$ARTIFACT_ID/zip" > restore/artifact.zip
          unzip restore/artifact.zip -d restore
          rm restore/artifact.zip

      - name: Setup SSH
        uses: ./.github/actions/setup-ssh
        with:
          ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}
          server_host: ${{ env.SERVER_HOST }}

      - name: Stop Valheim container
        run: |
          ssh root@${{ env.SERVER_HOST }} "/opt/valheim/scripts/stop.sh"

      - name: Upload and restore backup
        run: |
          scp restore/world-backup.tar.gz root@${{ env.SERVER_HOST }}:/tmp/world-restore.tar.gz
          ssh root@${{ env.SERVER_HOST }} "
            cd /mnt/valheim-world
            rm -rf worlds_local
            tar -xzf /tmp/world-restore.tar.gz
            rm /tmp/world-restore.tar.gz
            echo 'Restore complete.'
          "

      - name: Start Valheim container
        run: |
          ssh root@${{ env.SERVER_HOST }} "/opt/valheim/scripts/start.sh"

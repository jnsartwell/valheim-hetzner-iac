name: "Backup: Restore"

on:
  workflow_dispatch:
    inputs:
      artifact_name:
        description: 'Artifact name to restore (e.g. valheim-world-RedMist-20260316-1253)'
        required: true

jobs:
  restore:
    name: Restore World from Backup
    runs-on: ubuntu-latest

    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_TOKEN_APP_TERRAFORM_IO }}
      TF_VAR_hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
      TF_VAR_server_name: ${{ vars.SERVER_NAME }}
      TF_VAR_world_name: ${{ vars.WORLD_NAME }}
      TF_VAR_server_pass: ${{ secrets.SERVER_PASS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Get Server IP
        id: server_ip
        working-directory: terraform
        run: echo "ip=$(terraform output -raw server_ip)" >> $GITHUB_OUTPUT

      - name: Download backup artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p restore
          ARTIFACT_ID=$(gh api "repos/${{ github.repository }}/actions/artifacts?name=${{ inputs.artifact_name }}&per_page=1" --jq '.artifacts[0].id')
          if [ -z "$ARTIFACT_ID" ] || [ "$ARTIFACT_ID" = "null" ]; then
            echo "::error::Artifact '${{ inputs.artifact_name }}' not found."
            echo ""
            echo "Available artifacts:"
            gh api "repos/${{ github.repository }}/actions/artifacts?per_page=10" --jq '.artifacts[] | select(.expired == false) | .name'
            echo ""
            echo "Browse all artifacts: ${{ github.server_url }}/${{ github.repository }}/actions/workflows/backup.yml"
            exit 1
          fi
          gh api "repos/${{ github.repository }}/actions/artifacts/$ARTIFACT_ID/zip" > restore/artifact.zip
          unzip restore/artifact.zip -d restore
          rm restore/artifact.zip

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ steps.server_ip.outputs.ip }} >> ~/.ssh/known_hosts

      - name: Stop Valheim container
        run: |
          ssh root@${{ steps.server_ip.outputs.ip }} "/opt/valheim/scripts/stop.sh"

      - name: Upload and restore backup
        run: |
          scp restore/world-backup.tar.gz root@${{ steps.server_ip.outputs.ip }}:/tmp/world-restore.tar.gz
          ssh root@${{ steps.server_ip.outputs.ip }} "
            cd /mnt/valheim-world
            rm -rf worlds_local
            tar -xzf /tmp/world-restore.tar.gz
            rm /tmp/world-restore.tar.gz
            echo 'Restore complete.'
          "

      - name: Start Valheim container
        run: |
          ssh root@${{ steps.server_ip.outputs.ip }} "/opt/valheim/scripts/start.sh"

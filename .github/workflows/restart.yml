name: "Server: Restart"

on:
  workflow_dispatch:

env:
  SERVER_HOST: ${{ vars.SERVER_HOST }}

jobs:
  restart:
    name: Restart Container
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: ./.github/actions/setup-ssh
        with:
          ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}
          server_host: ${{ env.SERVER_HOST }}

      - name: Restart Valheim container
        run: |
          ssh root@${{ env.SERVER_HOST }} \
            "docker compose -f /opt/valheim/docker/compose.yaml --env-file /opt/valheim/docker/.env restart"

      - name: Write job summary
        run: |
          echo "## ${{ vars.SERVER_NAME }} — Restarted" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Container restarted at $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY

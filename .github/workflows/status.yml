name: Server Status

on:
  workflow_dispatch:

jobs:
  status:
    name: Check Server Status
    runs-on: ubuntu-latest

    steps:
      - name: Get server info
        id: server
        run: |
          RESPONSE=$(curl -s -H "Authorization: Bearer ${{ secrets.HCLOUD_TOKEN }}" \
            "https://api.hetzner.cloud/v1/servers?name=valheim")
          echo "ip=$(echo $RESPONSE | jq -r '.servers[0].public_net.ipv4.ip')" >> $GITHUB_OUTPUT
          echo "status=$(echo $RESPONSE | jq -r '.servers[0].status')" >> $GITHUB_OUTPUT
          echo "type=$(echo $RESPONSE | jq -r '.servers[0].server_type.name')" >> $GITHUB_OUTPUT
          echo "datacenter=$(echo $RESPONSE | jq -r '.servers[0].datacenter.location.name')" >> $GITHUB_OUTPUT

      - name: Setup SSH
        if: steps.server.outputs.status == 'running'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ steps.server.outputs.ip }} >> ~/.ssh/known_hosts

      - name: Get container info
        id: container
        if: steps.server.outputs.status == 'running'
        run: |
          INFO=$(ssh root@${{ steps.server.outputs.ip }} "
            STATUS=\$(docker ps -a --filter name=valheim --format '{{.Status}}')
            UPTIME=\$(uptime -p)
            MEM=\$(free -h | awk '/Mem:/ {print \$3 \" / \" \$2}')
            echo \"container_status=\$STATUS\"
            echo \"uptime=\$UPTIME\"
            echo \"memory=\$MEM\"
          ")
          echo "$INFO" >> $GITHUB_OUTPUT

      - name: Write job summary
        run: |
          echo "## RedMist — Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Hetzner Server" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ${{ steps.server.outputs.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **IP** | \`${{ steps.server.outputs.ip }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Connect** | \`${{ steps.server.outputs.ip }}:2456\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Type** | ${{ steps.server.outputs.type }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Datacenter** | ${{ steps.server.outputs.datacenter }} |" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.server.outputs.status }}" == "running" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Valheim Container" >> $GITHUB_STEP_SUMMARY
            echo "| | |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|" >> $GITHUB_STEP_SUMMARY
            echo "| **Container** | ${{ steps.container.outputs.container_status }} |" >> $GITHUB_STEP_SUMMARY
            echo "| **Uptime** | ${{ steps.container.outputs.uptime }} |" >> $GITHUB_STEP_SUMMARY
            echo "| **Memory** | ${{ steps.container.outputs.memory }} |" >> $GITHUB_STEP_SUMMARY
          fi

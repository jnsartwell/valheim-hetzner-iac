name: "Backup: Snapshot"

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

jobs:
  backup:
    name: Run Backup & Upload Artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Backup world
        id: backup
        uses: ./.github/actions/backup-world
        with:
          ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}
          server_host: ${{ vars.SERVER_HOST }}
          world_name: ${{ vars.WORLD_NAME }}
          artifact_prefix: snapshot

      - name: Write job summary
        run: |
          ARTIFACT="${{ steps.backup.outputs.artifact_name }}"
          if [ -n "$ARTIFACT" ]; then
            echo "## Backup Saved" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| | |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|" >> $GITHUB_STEP_SUMMARY
            echo "| **Artifact** | \`$ARTIFACT\` |" >> $GITHUB_STEP_SUMMARY
            echo "| **Retention** | 90 days |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> Use this artifact name when running the Restore workflow." >> $GITHUB_STEP_SUMMARY
          else
            echo "## Backup Failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Could not create backup. Check server connectivity." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

name: Deploy Valheim Server

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Terraform Apply
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_TOKEN_APP_TERRAFORM_IO }}
      TF_VAR_hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
      TF_VAR_server_name: ${{ vars.SERVER_NAME }}
      TF_VAR_world_name: ${{ vars.WORLD_NAME }}
      TF_VAR_server_pass: ${{ secrets.SERVER_PASS }}
      TF_VAR_discord_webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        run: terraform apply tfplan

      - name: Write job summary
        run: |
          IP=$(terraform output -raw server_ip)
          HOST=$(terraform output -raw hostname)
          echo "## RedMist — Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Server IP** | \`$IP\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Hostname** | \`$HOST\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Connect** | \`$HOST:2456\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Server may take 3–5 minutes to finish initializing." >> $GITHUB_STEP_SUMMARY

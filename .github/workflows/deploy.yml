name: "Terraform: Deploy"

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'

env:
  TF_TOKEN_app_terraform_io: ${{ secrets.TF_TOKEN_APP_TERRAFORM_IO }}
  TF_VAR_hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
  TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
  TF_VAR_valheim_server_name: ${{ vars.SERVER_NAME }}
  TF_VAR_valheim_world_name: ${{ vars.WORLD_NAME }}
  TF_VAR_valheim_server_pass: ${{ secrets.SERVER_PASS }}
  TF_VAR_valheim_admin_ids: ${{ vars.VALHEIM_ADMIN_IDS }}
  TF_VAR_discord_webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
  TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  TF_VAR_cloudflare_zone_id: ${{ vars.CLOUDFLARE_ZONE_ID }}

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    concurrency:
      group: terraform-apply
      cancel-in-progress: false
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: ./.github/actions/setup-terraform

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/tfplan
          retention-days: 1

  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: plan
    concurrency:
      group: terraform-apply
      cancel-in-progress: false
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: ./.github/actions/setup-terraform

      - name: Gracefully stop Valheim server
        uses: ./.github/actions/graceful-stop
        with:
          ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}
          server_host: ${{ vars.SERVER_HOST }}

      - name: Pre-deploy backup
        id: backup
        uses: ./.github/actions/backup-world
        with:
          ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}
          server_host: ${{ vars.SERVER_HOST }}
          world_name: ${{ vars.WORLD_NAME }}
          artifact_prefix: pre-deploy

      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: terraform

      - name: Terraform Apply
        run: terraform apply tfplan

      - name: Write job summary
        run: |
          IP=$(terraform output -raw server_ip)
          HOST=$(terraform output -raw hostname)
          CONNECT="${HOST:-$IP}:2456"
          echo "## RedMist — Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Server IP** | \`$IP\` |" >> $GITHUB_STEP_SUMMARY
          if [ -n "$HOST" ]; then
            echo "| **Hostname** | \`$HOST\` |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "| **Connect** | \`$CONNECT\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          BACKUP="${{ steps.backup.outputs.artifact_name }}"
          if [ -n "$BACKUP" ]; then
            echo "| **Pre-deploy backup** | \`$BACKUP\` |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Server may take 3–5 minutes to finish initializing." >> $GITHUB_STEP_SUMMARY

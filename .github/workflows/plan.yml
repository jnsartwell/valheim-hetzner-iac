name: "Terraform: Plan"

on:
  pull_request:
    branches: [main]
    paths:
      - 'terraform/**'

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    concurrency:
      group: terraform-plan-${{ github.head_ref }}
      cancel-in-progress: true
    permissions:
      contents: read
      pull-requests: write
    defaults:
      run:
        working-directory: terraform

    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_TOKEN_APP_TERRAFORM_IO }}
      TF_VAR_hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
      TF_VAR_valheim_server_name: ${{ vars.SERVER_NAME }}
      TF_VAR_valheim_server_pass: ${{ secrets.SERVER_PASS }}
      TF_VAR_valheim_admin_ids: ${{ vars.VALHEIM_ADMIN_IDS }}
      TF_VAR_discord_webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_zone_id: ${{ vars.CLOUDFLARE_ZONE_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: ./.github/actions/setup-terraform

      - name: Terraform Plan
        id: plan
        run: |
          set +e
          terraform plan -detailed-exitcode -no-color 2>&1 | tee plan_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
          set -e

      - name: Post plan to PR
        uses: actions/github-script@v7
        if: always()
        env:
          PLAN_EXIT_CODE: ${{ steps.plan.outputs.exit_code }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const exitCode = parseInt(process.env.PLAN_EXIT_CODE);
            const plan = fs.readFileSync('terraform/plan_output.txt', 'utf8');
            const summary = plan.match(/^(Plan:|No changes\.)[^\n]*/m)?.[0] ?? '';

            const statusIcon = exitCode === 1 ? '❌' : exitCode === 0 ? '✅' : '⚠️';
            const statusText = exitCode === 1 ? 'Plan failed' : exitCode === 0 ? 'No changes' : 'Changes detected';

            const body = [
              '## Terraform Plan',
              '',
              `${statusIcon} **${statusText}**${summary ? ` — \`${summary}\`` : ''}`,
              '',
              '<details>',
              '<summary>Show plan</summary>',
              '',
              '```hcl',
              plan.trim(),
              '```',
              '',
              '</details>',
              '',
              `> Triggered by ${context.actor} @ \`${context.sha.slice(0, 7)}\``,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('## Terraform Plan')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if plan errored
        if: steps.plan.outputs.exit_code == '1'
        run: exit 1

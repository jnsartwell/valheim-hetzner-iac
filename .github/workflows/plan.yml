name: Terraform Plan

on:
  pull_request:
    branches: [main]
    paths:
      - 'terraform/**'

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    concurrency:
      group: terraform-plan-${{ github.head_ref }}
      cancel-in-progress: true

    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_TOKEN_APP_TERRAFORM_IO }}
      TF_VAR_hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
      TF_VAR_server_name: ${{ vars.SERVER_NAME }}
      TF_VAR_world_name: ${{ vars.WORLD_NAME }}
      TF_VAR_server_pass: ${{ secrets.SERVER_PASS }}
      TF_VAR_discord_webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: |
          set +e
          terraform plan -detailed-exitcode -no-color 2>&1 | tee plan_output.txt
          PLAN_EXIT=${PIPESTATUS[0]}
          set -e

          if [ $PLAN_EXIT -eq 1 ]; then
            echo "## Plan Failed" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat plan_output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          if [ $PLAN_EXIT -eq 0 ]; then
            echo "## RedMist — No Infrastructure Changes" >> $GITHUB_STEP_SUMMARY
          else
            echo "## RedMist — Planned Changes" >> $GITHUB_STEP_SUMMARY
            echo '```hcl' >> $GITHUB_STEP_SUMMARY
            cat plan_output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

name: "World: Import from Release"

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to import from (e.g. world-MyWorld-20260316)'
        required: true

jobs:
  import:
    name: Import World from Release
    runs-on: ubuntu-latest
    environment: infra

    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_TOKEN_APP_TERRAFORM_IO }}
      TF_VAR_hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
      TF_VAR_server_name: ${{ vars.SERVER_NAME }}
      TF_VAR_world_name: ${{ vars.WORLD_NAME }}
      TF_VAR_server_pass: ${{ secrets.SERVER_PASS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Get Server IP
        id: server_ip
        working-directory: terraform
        run: echo "ip=$(terraform output -raw server_ip)" >> $GITHUB_OUTPUT

      - name: Download release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p import
          gh release download "${{ inputs.tag }}" --pattern "*.tar.gz" --dir import
          ASSET=$(ls import/*.tar.gz | head -1)
          if [ -z "$ASSET" ]; then
            echo "::error::No .tar.gz asset found in release ${{ inputs.tag }}"
            exit 1
          fi
          echo "ASSET_PATH=$ASSET" >> $GITHUB_ENV
          echo "Found asset: $ASSET"

      - name: Validate archive contents
        run: |
          # Detect the world name from the .db file
          SOURCE_WORLD=$(tar -tzf "$ASSET_PATH" | grep '\.db$' | head -1 | sed 's|\.db$||')
          if [ -z "$SOURCE_WORLD" ]; then
            echo "::error::No .db world save file found in archive"
            exit 1
          fi

          # Verify .fwl companion file exists
          if ! tar -tzf "$ASSET_PATH" | grep -q "^${SOURCE_WORLD}.fwl$"; then
            echo "::error::Missing .fwl file for world '${SOURCE_WORLD}'"
            exit 1
          fi

          echo "SOURCE_WORLD=$SOURCE_WORLD" >> $GITHUB_ENV
          echo "Archive is valid. Source world: $SOURCE_WORLD"
          echo "Contents:"
          tar -tzf "$ASSET_PATH"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ steps.server_ip.outputs.ip }} >> ~/.ssh/known_hosts

      - name: Stop Valheim container
        run: |
          ssh root@${{ steps.server_ip.outputs.ip }} "/opt/valheim/scripts/stop.sh"

      - name: Build import script
        run: |
          cat > /tmp/import-world.sh <<'SCRIPT'
          #!/usr/bin/env bash
          set -euo pipefail
          SOURCE_WORLD="$1"
          TARGET_WORLD="$2"
          RELEASE_TAG="$3"
          ACTOR="$4"
          RUN_URL="$5"
          DEST="/mnt/valheim-world/worlds_local"
          mkdir -p "$DEST"
          rm -f "$DEST"/*TexCache
          tar -xzf /tmp/world-import.tar.gz -C "$DEST"
          rm /tmp/world-import.tar.gz
          if [ "$SOURCE_WORLD" != "$TARGET_WORLD" ]; then
            echo "Renaming world '$SOURCE_WORLD' -> '$TARGET_WORLD'"
            mv "$DEST/$SOURCE_WORLD.db" "$DEST/$TARGET_WORLD.db"
            mv "$DEST/$SOURCE_WORLD.fwl" "$DEST/$TARGET_WORLD.fwl"
          fi
          cat > "$DEST/.import-origin" <<ORIGIN
          source_release: $RELEASE_TAG
          source_world: $SOURCE_WORLD
          target_world: $TARGET_WORLD
          imported_by: $ACTOR
          imported_at: $(date -u +%Y-%m-%dT%H:%M:%SZ)
          workflow_run: $RUN_URL
          ORIGIN
          echo "Import complete."
          SCRIPT
          chmod +x /tmp/import-world.sh

      - name: Upload and import world
        run: |
          SERVER=${{ steps.server_ip.outputs.ip }}
          scp "$ASSET_PATH" root@${SERVER}:/tmp/world-import.tar.gz
          scp /tmp/import-world.sh root@${SERVER}:/tmp/import-world.sh
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          ssh root@${SERVER} "/tmp/import-world.sh '${SOURCE_WORLD}' '${{ vars.WORLD_NAME }}' '${{ inputs.tag }}' '${{ github.actor }}' '${RUN_URL}'"
          ssh root@${SERVER} "rm /tmp/import-world.sh"

      - name: Start Valheim container
        run: |
          ssh root@${{ steps.server_ip.outputs.ip }} "/opt/valheim/scripts/start.sh"

      - name: Write job summary
        run: |
          echo "## RedMist — World Imported from Release" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Release** | \`${{ inputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Source world** | \`${SOURCE_WORLD}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Target world** | \`${{ vars.WORLD_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Imported by** | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Server** | \`${{ steps.server_ip.outputs.ip }}\` |" >> $GITHUB_STEP_SUMMARY

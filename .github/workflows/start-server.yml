name: Power On Hetzner Server

on:
  workflow_dispatch:

jobs:
  start:
    name: Power On Server
    runs-on: ubuntu-latest

    steps:
      - name: Get server info
        id: server
        run: |
          RESPONSE=$(curl -s -H "Authorization: Bearer ${{ secrets.HCLOUD_TOKEN }}" \
            "https://api.hetzner.cloud/v1/servers?name=valheim")
          echo "id=$(echo $RESPONSE | jq -r '.servers[0].id')" >> $GITHUB_OUTPUT
          echo "ip=$(echo $RESPONSE | jq -r '.servers[0].public_net.ipv4.ip')" >> $GITHUB_OUTPUT
          echo "status=$(echo $RESPONSE | jq -r '.servers[0].status')" >> $GITHUB_OUTPUT

      - name: Check server is off
        run: |
          if [ "${{ steps.server.outputs.status }}" == "running" ]; then
            echo "Server is already running."
            exit 0
          fi

      - name: Power on server
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.HCLOUD_TOKEN }}" \
            "https://api.hetzner.cloud/v1/servers/${{ steps.server.outputs.id }}/actions/poweron"

      - name: Write job summary
        run: |
          echo "## RedMist — Powered On" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **IP** | \`${{ steps.server.outputs.ip }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Connect** | \`${{ steps.server.outputs.ip }}:2456\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Valheim container starts automatically. Allow ~2 minutes before connecting." >> $GITHUB_STEP_SUMMARY

name: Backup World
description: Backup world data to a GitHub artifact (best-effort, does not block caller on failure)

inputs:
  ssh_private_key:
    required: true
  server_host:
    required: true
  artifact_prefix:
    description: Prefix for the artifact name (e.g. 'pre-deploy', 'snapshot')
    required: false
    default: backup

outputs:
  artifact_name:
    description: Name of the uploaded backup artifact (empty if backup failed)
    value: ${{ steps.set-output.outputs.artifact_name || '' }}

runs:
  using: composite
  steps:
    - name: Setup SSH
      uses: ./.github/actions/setup-ssh
      with:
        ssh_private_key: ${{ inputs.ssh_private_key }}
        server_host: ${{ inputs.server_host }}

    - name: Capture metadata
      id: meta
      shell: bash
      run: |
        echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
        echo "timestamp=$(date -u +%Y%m%d-%H%M)" >> $GITHUB_OUTPUT

    - name: Trigger backup on server
      id: backup
      shell: bash
      continue-on-error: true
      run: |
        ssh -o ConnectTimeout=10 root@${{ inputs.server_host }} "/opt/valheim/scripts/backup.sh"

    - name: Download backup
      id: download
      if: steps.backup.outcome == 'success'
      shell: bash
      continue-on-error: true
      run: |
        LATEST=$(ssh root@${{ inputs.server_host }} \
          "ls -t /mnt/valheim-world/backups/world_*.tar.gz 2>/dev/null | head -1")
        if [ -z "$LATEST" ]; then
          echo "No backups found"
          exit 1
        fi
        scp root@${{ inputs.server_host }}:"$LATEST" world-backup.tar.gz

    - name: Upload artifact
      id: upload
      if: steps.download.outcome == 'success'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact_prefix }}-${{ steps.meta.outputs.short_sha }}-${{ steps.meta.outputs.timestamp }}
        path: world-backup.tar.gz
        retention-days: 90

    - name: Set artifact name output
      id: set-output
      if: steps.download.outcome == 'success'
      shell: bash
      run: echo "artifact_name=${{ inputs.artifact_prefix }}-${{ steps.meta.outputs.short_sha }}-${{ steps.meta.outputs.timestamp }}" >> $GITHUB_OUTPUT
